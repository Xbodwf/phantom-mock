version: '3.8'

services:
  phantom-mock:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phantom-mock
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./static:/app/static
    environment:
      - NODE_ENV=production
      - PORT=7143
      # MongoDB 连接配置（可选，如果使用 MongoDB）
      # - MONGODB_URI=mongodb://mongodb:27017/phantom-mock
    ports:
      - "7143:7143"
    # 如果使用 MongoDB，取消下面的注释
    # depends_on:
    #   - mongodb

  # MongoDB 服务（可选）
